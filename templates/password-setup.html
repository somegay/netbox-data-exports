<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netbox Manager Password Setup</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/auth.css') }}" />
</head>
<body class="app-locked" data-auth-mode="setup">
  <div class="access-screen" id="accessScreen">
    <div class="access-card">
      <h1 class="access-title">Create Password</h1>
      <p class="access-subtitle" id="accessSubtitle">Create a password to secure your application access</p>

      <form id="accessForm" class="access-form" autocomplete="off">
        <label for="accessPassword">Password</label>
        <input type="password" id="accessPassword" placeholder="Create password" required />

        <ul class="access-rules" id="accessRules">
          <li data-rule="length">At least 8 characters long</li>
          <li data-rule="uppercase">Contains at least one uppercase</li>
          <li data-rule="number">Contains at least one number</li>
          <li data-rule="special">Contains at least one special character</li>
        </ul>

        <label for="confirmAccessPassword">Confirm Password</label>
        <input type="password" id="confirmAccessPassword" placeholder="Re-enter password" required />

        <button type="submit" id="accessSubmitBtn">Save Password</button>
        <p class="access-note">After saving, you will continue to the configuration setup page.</p>
        <p class="access-error" id="accessError" style="display:none"></p>
      </form>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
